<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ejercicio 2 - Personas con JavaScript</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a class="logo" href="index.html">Trabajo Practico N°3</a>
      <div class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="flexbox.html">Flexbox</a>
        <a href="react.html">Personas React</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="page-title">
      <p class="tag">Ejercicio 2</p>
      <h1>Formulario y tabla con JavaScript comun</h1>
      <p>
        Esta pagina usa arreglos, funciones, condicionales, DOM y eventos para
        agregar personas, quitarlas y calcular su IMC.
      </p>
    </section>

    <section class="exercise-layout">
      <form id="person-form" class="form-box">
        <label>Nombre
          <input id="nombre" type="text" required />
        </label>

        <label>Apellido
          <input id="apellido" type="text" required />
        </label>

        <label>Edad
          <input id="edad" type="number" min="1" max="120" required />
        </label>

        <label>Altura en metros
          <input id="altura" type="number" min="0.5" step="0.01" placeholder="Ej: 1.70" required />
        </label>

        <label>Peso en kg
          <input id="peso" type="number" min="1" step="0.1" placeholder="Ej: 68" required />
        </label>

        <button type="submit">Agregar persona</button>
      </form>

      <div class="table-box">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Apellido</th>
              <th>Edad</th>
              <th>Altura</th>
              <th>Peso</th>
              <th>IMC</th>
              <th>Accion</th>
            </tr>
          </thead>
          <tbody id="people-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="footer">
    <a href="index.html">Volver al inicio</a>
  </footer>

  <script src="js/personas.js"></script>
</body>
</html>
